<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>To-do List</h2>
    <form method="POST">
        {% csrf_token %}
        <label for="Taskname">Task Name</label>
        <input type="text" placeholder="add task" name="task-name">
        <br><br>
        <label for="date">Date</label>
        <input type="date" name="task-date">
        <br><br>
        <button>Add</button>
    </form>
    <button>
        <a href="{% url 'task_list' %}">view task</a>
    </button>
</body>
</html>
