<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <section>
        <h1>Task</h1>
        {% for i in task %}
            <p>{{i.task}}</p>
            <p>{{i.date}}</p>
            <button>
                <a href="{% url 'task'  i.id %}">Delete</a>
            </button>
            <button>
                <a href="{% url 'update_task'  i.id %}">Update</a>
            </button>
        {% endfor %}
    </section>
    <br><br>
    <button>
        <a href="{% url 'home'  %}">Back to add task</a>
    </button>
</body>
</html>
