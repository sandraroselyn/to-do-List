<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .cont{
            padding: 90px;
           box-sizing: content-box;
            box-shadow: 0 0 20px;
            margin: 150px;
            width: 400px;
            margin-left: 29%;
            border-radius: 8px;
            background-color: rgb(189, 231, 194);
        }
        button{
            size: 15px;
            background-color: rgb(47, 88, 47);
           
        }
            
       
    </style>
</head>
<body>
    <section>
        <div class="cont">
            <h1>Your Tasks</h1>
           
                {% for i in task %}
                <p>{{i.task}}</p>
                <p>{{i.date}}</p>
                <button>
                    <a href="{% url 'task' i.id %}" style=" text-decoration: none;
                        color: white;">Delete</a>
                </button>
                <button>
                    <a href="{% url 'update_task' i.id %}" style=" text-decoration: none;
                         color: white;">Update</a>
                </button>
                <br><br>
                {% endfor %}
            
    
        <br><br>
        <button>
            <a href="{% url 'home'  %}"  style=" text-decoration: none;
                        color: white;">Back to add task</a>
        </button>
    </section>
    </div>
</body>
</html>
