<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update To-Do</title>

    <style>
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f4f4f4;
        }

        .contain{
            padding: 40px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
            width: 400px;
            border-radius: 8px;
            background-color: rgb(189, 231, 194);
            font-size: large;
        }

        input{
            padding: 8px;
            width: 200px;
        }

        button{
            padding: 10px 20px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="contain">
        <h2>Update To-Do List</h2>

        <form method="POST">
            {% csrf_token %}

            <label>Task Name</label>
            <input type="text" name="task-name" value="{{ a.task }}">

            <br><br>

            <label>Date</label>
            <input type="date" name="task-date"
                   value="{{ a.date|date:'Y-m-d' }}">

            <br><br>

            <button type="submit">Update</button>
        </form>
    </div>
</body>
</html>
